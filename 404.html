<!doctype html>
<html lang="es-419">
  <head>
    <meta charset="UTF-8" />
    <title>Artifex Dev - Ramiro Aníbal Escobar</title>
    <script type="text/javascript">
      // GitHub Pages no soporta rewrites de SPA: este 404 redirige cualquier
      // ruta (ej. /business) a index.html codificándola en el query string.
      // Técnica: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
