    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />

    <!-- Precalienta la conexión a Supabase (galería de fotografía). -->
    <link rel="preconnect" href="https://erjyzhefwndkumadlpzr.supabase.co" crossorigin />

    <meta name="description" content="Artifex es el taller de Ramiro Escobar en Victoria, Entre Ríos: sitios y sistemas web a medida, fotografía de eventos, retratos y producto, y tufting (alfombras y tapices artesanales)." />
    <meta name="keywords" content="Desarrollo web, Sitios web a medida, Sistemas web, React, Next.js, TypeScript, Fotografía, Fotógrafo, Fotografía de eventos, Fotografía de producto, Tufting, Alfombras artesanales, Tapices, Artifex, Artifex Dev, Ramiro Escobar, Ramiro Dev, Ramiro Fotografía, Ramiro Tufting, Victoria Entre Ríos, Argentina" />
    <meta name="author" content="Ramiro Aníbal Escobar" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <!-- El mismo build se sirve en artifex.click (Hostinger) y artifex94.github.io;
         el canonical consolida el SEO en el dominio del negocio. -->
    <link rel="canonical" href="https://artifex.click/" />
    <link rel="alternate" type="application/rss+xml" title="Artifex Blog" href="/rss.xml" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Artifex" />
    <meta property="og:locale" content="es_AR" />
    <meta property="og:url" content="https://artifex.click/" />
    <meta property="og:title" content="Artifex — Desarrollo web, Fotografía y Tufting | Ramiro Escobar" />
    <meta property="og:description" content="Sitios y sistemas web a medida, fotografía de eventos, retratos y producto, y tufting artesanal en Victoria, Entre Ríos. Un taller, tres oficios." />
    <meta property="og:image" content="https://artifex.click/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Artifex — Ramiro Escobar: desarrollo, fotografía y tufting" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Artifex — Desarrollo web, Fotografía y Tufting | Ramiro Escobar" />
    <meta property="twitter:description" content="Sitios y sistemas web a medida, fotografía de eventos, retratos y producto, y tufting artesanal en Victoria, Entre Ríos. Un taller, tres oficios." />
    <meta property="twitter:image" content="https://artifex.click/og-image.png" />

    <script type="text/javascript">
      // Decodifica la ruta que 404.html guardó en el query string y la
      // restaura antes de que React Router lea la URL.
      // Técnica: https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
