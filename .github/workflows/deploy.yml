name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run test:run

      # Chromium para el prerender (build:static). Cacheado por versión de
      # playwright-core para no re-descargarlo en cada corrida.
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium for prerender
        run: node node_modules/playwright-core/cli.js install --with-deps chromium

      # build:static = build + prerender: escribe el HTML estático por ruta con
      # H1/meta/JSON-LD reales, para que los crawlers sociales sin JS los lean.
      - run: npm run build:static

      # Publica dist/ en la rama gh-pages (misma rama que usa `npm run deploy`)
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
